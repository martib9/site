<html>
  <head>
    <title>Rhyming Poem Generator</title>
    <style>
      /* Add some basic styles */
      body {
        font-family: Arial, sans-serif;
        text-align: center;
        background-color: #f1f1f1;
      }
      
      /* Style the input container */
      .input-container {
        background-color: white;
        border: 1px solid #e5e5e5;
        box-shadow: 0px 2px 4px rgba(0, 0, 0, 0.1);
        margin: 60px auto;
        padding: 20px;
        width: 500px;
      }
      
      /* Style the input block */
      .input-block {
        font-size: 18px;
        margin-bottom: 20px;
        padding: 10px;
        text-align: center;
        width: 100%;
      }
      
      /* Style the submit button */
      .submit-button {
        background-color: #4285f4;
        border: none;
        color: white;
        cursor: pointer;
        font-size: 18px;
        padding: 10px 20px;
      }
      
      /* Style the poem container */
      .poem-container {
        background-color: white;
        border: 1px solid #e5e5e5;
        box-shadow: 0px 2px 4px rgba(0, 0, 0, 0.1);
        margin: 60px auto;
        padding: 40px;
        width: 500px;
    }
    </style>
  </head>
  <body>
    <div id="input-block">
      <input type="text" id="word-input" maxlength="20">
      <button id="generate-button">Generate Poem</button>
    </div>
    <div id="poem-block"></div>

    <script>
      const generateButton = document.getElementById('generate-button');
      const wordInput = document.getElementById('word-input');
      const poemBlock = document.getElementById('poem-block');

      generateButton.addEventListener('click', async () => {
        const word = wordInput.value;
        if (!word) {
          alert('Please enter a word');
          return;
        }

        const response = await fetch('https://api.amplifyapp.com/amplify.eu-west-2.amazonaws.com]', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({ word }),
        });

        const poem = await response.text();
        poemBlock.innerHTML = poem;
      });
    </script>
  </body>
</html>
