<html>
  <head>
    <title>Rhyming Poem Generator</title>
    <style>
      /* Add some basic styles */
      body {
        font-family: Arial, sans-serif;
        text-align: center;
        background-color: #f1f1f1;
      }
      
      /* Style the input container */
      .input-container {
        background-color: white;
        border: 1px solid #e5e5e5;
        box-shadow: 0px 2px 4px rgba(0, 0, 0, 0.1);
        margin: 60px auto;
        padding: 20px;
        width: 500px;
      }
      
      /* Style the input block */
      .input-block {
        font-size: 18px;
        margin-bottom: 20px;
        padding: 10px;
        text-align: center;
        width: 100%;
      }
      
      /* Style the submit button */
      .submit-button {
        background-color: #4285f4;
        border: none;
        color: white;
        cursor: pointer;
        font-size: 18px;
        padding: 10px 20px;
      }
      
      /* Style the poem container */
      .poem-container {
        background-color: white;
        border: 1px solid #e5e5e5;
        box-shadow: 0px 2px 4px rgba(0, 0, 0, 0.1);
        margin: 60px auto;
        padding: 40px;
        width: 500px;
      }
    </style>
  </head>
  <body>
    <div class="input-container">
      <h2>Enter a word (20 characters max):</h2>
      <input type="text" class="input-block" id="wordInput" maxlength="20">
      <button class="submit-button" onclick="generatePoem()">Generate Poem</button>
    </div>
    <div class="poem-container" id="poemContainer" style="display: none;">
      <h2 id="poemTitle"></h2>
      <p id="poemText"></p>
    </div>
    
    <script>
        function generatePoem() {
          // Get the input word
          var inputWord = document.getElementById("inputWord").value;
  
          // Send the API request to OpenAI
          var request = new XMLHttpRequest();
          request.open("POST", "https://api.openai.com/v1/engines/text-davinci-002/jobs");
          request.setRequestHeader("Content-Type", "application/json");
          request.setRequestHeader("Authorization", "Bearer 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");
          request.onload = function() {
            var response = JSON.parse(request.responseText);
            var poem = response.choices[0].text;
            
            // Display the generated poem
            document.getElementById("poemTitle").innerHTML = "Here's your rhyming poem:";
            document.getElementById("poemText").innerHTML = poem;
            document.getElementById("poemContainer").style.display = "block";
          };
          var prompt = "Write a poem that rhymes with the word '" + inputWord + "'.";
          var requestData = JSON.stringify({ "prompt": prompt, "max_tokens": 256 });
          request.send(requestData);
        }
      </script>
    </body>
  </html>
