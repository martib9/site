<!DOCTYPE html>
<html>
<head>
  <title>Poem Generator</title>
  <link href="https://fonts.googleapis.com/css?family=Montserrat&display=swap" rel="stylesheet">
  <link rel="stylesheet" type="text/css" href="poem.css">
</head>
<body>
  <div class="container">
    <h1>Enter one word to generate a poem</h1>
    <form id="poem-form">
      <input type="text" id="word-input" placeholder="Type here..." maxlength="15">
      <span class="error-message" id="error-message"></span>
      <p class="input-description">Word no longer than 15 symbols</p>
      <button type="submit" id="generate-button">Generate Poem</button>
    </form>
    <div class="poem-container">
      <h2>Generated Poem</h2>
      <p id="poem-text"></p>
      <div class="share-buttons">
        <a href="#" class="twitter-share-button">Share on Twitter</a>
        <a href="#" class="telegram-share-button">Share on Telegram</a>
      </div>
    </div>
  </div>

  <script src="script2.js"></script>
</body>
</html>
