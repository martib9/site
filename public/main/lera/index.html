<script id="rendered-js" >
fetch(
"https://api.giphy.com/v1/gifs/search?api_key=NQxPr4nWkjbjgFtv9cdcrPq67QfXq4gc&q=dogs&limit=50&offset=0&rating=r&lang=en").


then(function (res) {

    res.data.forEach(el => {
      var gif = document.createElement("img");
      gif.setAttribute("src", el.images.original.url);
      gif.setAttribute("autoplay", "true");
      gif.addEventListener("click", () => {
        window.open(el.images.original.url);
      });
      document.querySelector(".grid").appendChild(gif);
    });
  });
}).

catch(function (e) {
  console.log(e);
});
