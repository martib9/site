<!DOCTYPE html>
<html>
<head>
  <title>Poem Generator</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Montserrat', sans-serif;
      color: white;
      background-color: black;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }
    form {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    input {
      padding: 10px;
      font-size: 20px;
      border: none;
      border-radius: 5px;
      margin-bottom: 10px;
      text-align: center;
      width: 100%;
      max-width: 400px;
      box-sizing: border-box;
    }
    input:focus {
      outline: none;
    }
    #wordInput::placeholder {
      color: white;
    }
    #error {
      font-style: italic;
      color: red;
      margin-bottom: 10px;
    }
    #poemContainer {
      font-style: italic;
      text-align: center;
      margin-top: 20px;
    }
    .share-link {
      display: inline-block;
      margin: 10px;
    }
    .share-icon {
      vertical-align: middle;
      margin-right: 5px;
    }
  </style>
</head>
<body>
  <h1>Poem Generator</h1>
  <form id="wordForm">
    <input id="wordInput" type="text" placeholder="Enter one word to generate a poem" maxlength="15" required />
    <div id="error"></div>
    <button type="submit">Generate</button>
  </form>
  <div id="poemContainer"></div>
  <div id="shareContainer">
    <a class="share-link" href="#" target="_blank">
      <img class="share-icon" src="https://image.flaticon.com/icons/svg/145/145812.svg" width="16" height="16" alt="Share on Twitter" />
      Share on Twitter
    </a>
    <a class="share-link" href="#" target="_blank">
      <img class="share-icon" src="https://image.flaticon.com/icons/svg/2111/2111646.svg" width="16" height="16" alt="Share on Telegram" />
      Share on Telegram
    </a>
  </div>
  <script src="config.js"></script>
<script>
  function generatePoem(event) {
    event.preventDefault();

    const input = document.getElementById("wordInput").value.trim();
    const error = document.getElementById("error");
    if (input === "") {
      error.innerHTML = "Add word";
      return;
    } else {
      error.innerHTML = "";
    }
    const xhr = new XMLHttpRequest();
    xhr.open("POST", "https://api.openai.com/v1/engines/davinci-codex/completions");
    xhr.setRequestHeader("Content-Type", "application/json");
    xhr.setRequestHeader("Authorization", "Bearer " + config.OPENAI_API_KEY);
    xhr.onreadystatechange = function() {
      if (this.readyState === 4 && this.status === 200) {
        const response = JSON.parse(this.responseText);
        const poem = response.choices[0].text;
        document.getElementById("poemContainer").innerHTML = poem;
        const shareUrl = encodeURIComponent(window.location.href);
        const shareText = encodeURIComponent(`Check out this poem generated by the word "${input}":\n\n${poem}`);
        document.querySelector("a[href*='twitter']").setAttribute("href", `https://twitter.com/intent/tweet?url=${shareUrl}&text=${shareText}`);
        document.querySelector("a[href*='telegram']").setAttribute("href", `https://t.me/share/url?url=${shareUrl}&text=${shareText}`);
      }
    };
    const data = JSON.stringify({
      prompt: `Generate a poem to the rhythm of "${input}"`,
      max_tokens: 10000,
      stop: ["\n", "Poem:"].concat(Array(4).fill("\n")),
      n: 1,
      stream: true,
      temperature: 1,
      frequency_penalty: 0.5,
      presence_penalty: 0.5
    });
    xhr.send(data);
  }

  const form = document.getElementById("wordForm");
  form.addEventListener("submit", generatePoem);
</script>
</body>
</html>
