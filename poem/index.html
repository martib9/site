<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Poem Generator</title>
  <link rel="stylesheet" href="/poem/style.css">
</head>
<body>
  <main>
    <form>
      <section>
        <h2>Enter one word to generate a poem</h2>
        <input type="text" id="input-word" placeholder="Enter word here">
        <div class="input-subline">Word no longer than 15 symbols</div>
        <button id="generate-button">Generate Poem</button>
        <div id="error-message"></div>
      </section>
    </form>
    <section>
      <h2>Poem</h2>
      <div id="poem"></div>
    </section>
  </main>
  <script src="/poem/script.js"></script>
</body>
</html>
