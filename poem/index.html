<!DOCTYPE html>
<html>
<head>
  <title>Poem Generator</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@openai/api@0.4.4/dist/index.js" crossorigin></script>
  <script src="config.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Montserrat', sans-serif;
    }

    body {
      background-color: black;
      color: white;
      max-width: 800px;
      margin: 0 auto;
    }

    header {
      text-align: left;
      margin: 2rem 0;
    }

    header h1 {
      font-size: 3rem;
    }

    header p.tagline {
      font-size: 1.5rem;
      margin-top: 1rem;
      line-height: 1.5;
    }

    main {
      padding: 2rem;
    }

    section {
      margin-bottom: 2rem;
    }

    section h2 {
      font-size: 2rem;
      margin-bottom: 1rem;
    }

    ul {
      list-style: none;
      padding: 0;
    }

    ul li {
      margin-bottom: 1rem;
    }

    a {
      color: white;
      text-decoration: none;
      display: inline-block;
      background-image: url(/images/skull.png);
      background-size: contain;
      background-repeat: no-repeat;
      background-position: left center;
      padding-left: 2rem;
    }

    a:hover {
      color: #7e7e7e;
    }

    a:visited {
      color: #bfbfbf;
    }

    a[target="_blank"]::after {
      content: "↗";
      margin-left: 0.2em;
    }

    button {
      background-color: white;
      color: black;
      padding: 0.5rem 1rem;
      border: none;
      border-radius: 0.5rem;
      cursor: pointer;
    }

    #poem {
      font-size: 1.2rem;
      line-height: 1.5;
      margin-top: 2rem;
    }

    @media (max-width: 600px) {
      header h1 {
        font-size: 2.5rem;
      }

      header p.tagline {
        font-size: 1rem;
      }

      section h2 {
        font-size: 1.5rem;
      }

      ul li {
        margin-bottom: 0.5rem;
      }

      button {
        font-size: 1rem;
      }
    }
  </style>
  <script>
    async function generatePoem() {
      const input = document.getElementById('input').value;
      const model = await new OpenAI(apiKey);
      const prompt = `Generate a poem about ${input}.`;
      const completions = await model.complete({
        engine: 'davinci',
        prompt: prompt,
        maxTokens: 1024,
        n: 1,
        stop: '\n',
      });
      const poem = completions.choices[0].text.trim();
      document.getElementById('poem').innerHTML = poem;
    }
  </script>
</head>
<body>
	<header>
		<h1>Poetry Generator</h1>
		<p class="tagline">Generate a poem about anything.</p>
	</header>
	<main>
		<section>
			<h2>Enter a word or phrase:</h2>
			<div class="input-container">
				<input type="text" id="input">
				<button onclick="generatePoem()">Generate</button>
			</div>
			<div id="poem"></div>
			<div class="share-buttons">
				<a href="https://twitter.com/intent/tweet?text=Check+out+this+awesome+poem+generator%21&url=https%3A%2F%2Fexample.com" target="_blank">Share on Twitter</a>
				<a href="https://www.facebook.com/sharer/sharer.php?u=https%3A%2F%2Fexample.com" target="_blank">Share on Facebook</a>
			</div>
		</section>
	</main>
</body>
</html>
